<div class="categories">
  <button
    *ngFor="let c of categories"
    (click)="selectCategory(c.id)"
    [class.active]="selectedCategoryId === c.id"
  >
    {{ c.name }}
  </button>
</div>

<div *ngIf="selectedCategoryId; else welcome">
  <app-product-list [products]="productsToShow"></app-product-list>
</div>

<ng-template #welcome>
  <p>Select a category to see products.</p>
</ng-template>
