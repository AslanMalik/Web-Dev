<section class="album-detail">
  <div class="section-header">
    <div>
      <p class="eyebrow">Album #{{ albumId }}</p>
      <h2>Album Details</h2>
    </div>
    <div class="actions">
      <a class="btn secondary" [routerLink]="['/albums']">Back</a>
      <a class="btn ghost" [routerLink]="['/albums', albumId, 'photos']">View Photos</a>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Loading album...</div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="detail-card" *ngIf="!loading && album">
    <div class="detail-grid">
      <div>
        <span class="label">Album ID</span>
        <span class="value">{{ album.id }}</span>
      </div>
      <div>
        <span class="label">User ID</span>
        <span class="value">{{ album.userId }}</span>
      </div>
    </div>

    <label class="input-group">
      <span>Album Title</span>
      <input type="text" [(ngModel)]="title" />
    </label>

    <button class="btn" type="button" (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>
  </div>
</section>
